<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Daily Routine App</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
        <div style="position: relative; width: 80px; height: 80px;">
          <div style="position: absolute; width: 100%; height: 100%; border: 4px solid #f3f4f6; border-radius: 50%;"></div>
          <div style="position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s ease-in-out infinite;"></div>
        </div>
        <div style="margin-top: 24px; text-align: center;">
          <h1 style="margin: 0; color: #111827; font-size: 20px; font-weight: 700; letter-spacing: -0.025em;">Daily Routine</h1>
          <p style="margin: 8px 0 0; color: #6b7280; font-size: 14px; font-weight: 500;">লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</p>
        </div>
        <style>
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
          body { margin: 0; padding: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
